<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuizQuest</title>
    <!-- Include Trystero Nostr engine for free serverless connection -->
    <script src="https://unpkg.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; max-width: 100%; }
        body { font-family: sans-serif; background: #121214; color: #fff; padding: 15px; text-align: center; overflow-x: hidden; }
        h1 { color: #e43f5a; font-size: 24px; margin-bottom: 10px; }
        h2 { color: #e43f5a; font-size: 18px; margin: 10px 0; }
        p { font-size: 14px; margin: 5px 0; color: #aaa; }
        div { width: 100%; margin: 10px 0; display: block; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; background: #18181b; color: #fff; border: 1px solid #333; font-size: 15px; display: block; }
        button { background: #e43f5a; color: white; border: none; padding: 14px; font-size: 15px; border-radius: 8px; cursor: pointer; margin: 8px 0; width: 100%; display: block; font-weight: bold; }
        button:hover { background: #ff4a6a; }
        .hidden { display: none !important; }
        ul { list-style: none; padding: 0; margin: 10px 0; }
        li { background: #18181b; margin: 6px 0; padding: 12px; border-radius: 6px; text-align: left; font-size: 14px; border-left: 4px solid #e43f5a; }
        .score { font-size: 20px; font-weight: bold; color: #22c55e; margin: 10px 0; }
    </style>
</head>
<body>

    <h1>🚀 QuizQuest Live</h1>

    <!-- MENU -->
    <div id="m">
        <button onclick="h()">Host Game</button>
        <button onclick="s()">Join Game</button>
    </div>

    <!-- JOIN SETUP -->
    <div id="j" class="hidden">
        <input type="text" id="p" placeholder="Enter 4-Digit Room PIN">
        <input type="text" id="n" placeholder="Enter Nickname">
        <button onclick="g()">Join Lobby</button>
        <button onclick="stopGame()" style="background:#444;">Quit</button>
    </div>

    <!-- HOST LOBBY -->
    <div id="hl" class="hidden">
        <h2>ROOM PIN: <span id="l" style="color:#22c55e;">0000</span></h2>
        <p>(Share this simple 4-Digit PIN with your friends)</p>
        <ul id="pl"></ul>
        <button onclick="st()">▶️ Start Quiz</button>
        <button onclick="stopGame()" style="background:#444;">Close Server</button>
    </div>

    <!-- PLAYER WAIT SCREEN -->
    <div id="wait" class="hidden">
        <p id="wait-msg">Connecting to room channel...</p>
        <button onclick="stopGame()" style="background:#444; margin-top:15px;">Leave Game</button>
    </div>

    <!-- HOST LEADERBOARD VIEW -->
    <div id="hg" class="hidden">
        <h2 id="hq">Question...</h2>
        <ul id="lb"></ul>
        <button onclick="stopGame()" style="background:#444;">Force Stop</button>
    </div>

    <!-- PLAYER QUESTIONS -->
    <div id="pg" class="hidden">
        <div class="score">🪙 Gold: <span id="gold">0</span></div>
        <h3 id="pq-text" style="margin: 10px 0; color:#e43f5a;">Question text</h3>
        <button onclick="ans(0)" id="b0" style="background:#1e1b4b;"></button>
        <button onclick="ans(1)" id="b1" style="background:#1e1b4b;"></button>
        <button onclick="ans(2)" id="b2" style="background:#1e1b4b;"></button>
        <button onclick="ans(3)" id="b3" style="background:#1e1b4b;"></button>
    </div>

    <!-- CHEST CHOICE -->
    <div id="ch" class="hidden">
        <h2>Pick a Chest</h2>
        <button onclick="chst()" style="background:#eab308; color:#000;">🎁 Chest 1</button>
        <button onclick="chst()" style="background:#eab308; color:#000;">🎁 Chest 2</button>
        <button onclick="chst()" style="background:#eab308; color:#000;">🎁 Chest 3</button>
    </div>

    <!-- GAME OVER -->
    <div id="go" class="hidden">
        <h2>Final Standings 🏆</h2>
        <ul id="fl"></ul>
        <button onclick="location.reload()">Return Home</button>
    </div>

    <script>
        const qd = [
            { q: "What is 5 + 7?", a: ["10", "12", "14", "11"], c: 1 },
            { q: "Which planet is Red?", a: ["Earth", "Mars", "Jupiter", "Venus"], c: 1 },
            { q: "Capital of France?", a: ["London", "Berlin", "Paris", "Rome"], c: 2 }
        ];
        
        let room, sendJoin, sendScore, sendStart, sendNxt, sendEnd, sendSync;
        let host = false, name = "", qidx = 0, pld = {}, gold = 0, pin = "";

        function sw(id) {
            ['m', 'j', 'hl', 'wait', 'hg', 'pg', 'ch', 'go'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        function s() { sw('j'); }

        // HOST ENGINE
        function h() {
            host = true; pin = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('l').innerText = pin; sw('hl');
            
            // Connect to free Nostr mesh relay network using a standard configuration profile
            room = trystero.joinRoom({appId: 'blooket-safari-unblocked-p2p'}, pin);
            
            const [bindJoin] = room.makeAction('join');
            const [bindScore] = room.makeAction('score');
            [sendStart] = room.makeAction('start');
            [sendNxt] = room.makeAction('nxt');
            [sendEnd] = room.makeAction('end');
            [sendSync] = room.makeAction('sync');

            bindJoin((data) => { pld[data.n] = { s: 0 }; ulb(); sendSync({d: pld}); });
            bindScore((data) => { pld[data.n].s += data.v; uhg(); sendSync({d: pld}); });
        }

        function ulb() {
            let u = document.getElementById('pl'); u.innerHTML = "";
            Object.keys(pld).forEach(p => { let i = document.createElement('li'); i.innerText = "👤 Connected: " + p; u.appendChild(i); });
        }

        function st() {
            if (Object.keys(pld).length === 0) return alert("Wait for players to join!");
            sendStart({ i: 0 }); hlp();
        }

        function hlp() {
            sw('hg');
            if (qidx < qd.length) {
                document.getElementById('hq').innerText = "Question " + (qidx+1) + ": " + qd[qidx].q; uhg();
                setTimeout(() => {
                    qidx++;
                    if (qidx < qd.length) { sendNxt({ i: qidx }); hlp(); }
                    else { sendEnd({}); fin(); }
                }, 10000);
            }
        }

        function uhg() {
            let u = document.getElementById('lb'); u.innerHTML = "";
            Object.keys(pld).sort((a,b) => pld[b].s - pld[a].s).forEach((p, i) => {
                let l = document.createElement('li'); l.innerHTML = `#${i+1} <b>${p}</b>: 🪙 ${pld[p].s} Gold`; u.appendChild(l);
            });
        }

        function fin() {
            sw('go'); let u = document.getElementById('fl'); u.innerHTML = "";
            Object.keys(pld).sort((a,b) => pld[b].s - pld[a].s).forEach((p, i) => {
                let l = document.createElement('li'); l.innerText = `🏆 #${i+1}: ${p} (${pld[p].s} Gold)`; u.appendChild(l);
            });
        }

        // PLAYER ENGINE
        function g() {
            pin = document.getElementById('p').value.trim();
            name = document.getElementById('n').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
            if (!pin || !name) return alert('Enter Pin and Nickname!');
            
            sw('wait');
            document.getElementById('wait-msg').innerText = "Connecting to Host PIN " + pin + "...";

            room = trystero.joinRoom({appId: 'blooket-safari-unblocked-p2p'}, pin);
            
            [sendJoin] = room.makeAction('join');
            [sendScore] = room.makeAction('score');
            const [bindStart] = room.makeAction('start');
            const [bindNxt] = room.makeAction('nxt');
            const [bindEnd] = room.makeAction('end');
            const [bindSync] = room.makeAction('sync');

            // Periodic connection loop to guarantee registration
            let connectLoop = setInterval(() => { sendJoin({ n: name }); }, 1000);

            bindSync((data) => { 
                clearInterval(connectLoop); 
                document.getElementById('wait-msg').innerText = "✅ Joined successfully! Waiting for host...";
                if(data.d[name] !== undefined) { gold = data.d[name].s; document.getElementById('gold').innerText = gold; } 
            });

            bindStart((data) => { qidx = data.i; lq(); });
            bindNxt((data) => { qidx = data.i; lq(); });
            bindEnd(() => { sw('go'); document.getElementById('fl').innerHTML = "<li>Game Over! Rankings visible on host screen.</li>"; });
        }

        function lq() {
            sw('pg'); let q = qd[qidx]; document.getElementById('pq-text').innerText = "Question " + (qidx+1) + ": " + q.q;
            for(let i=0; i<4; i++) { let b = document.getElementById('b'+i); b.innerText = q.a[i]; b.disabled = false; }
        }

        function ans(i) {
            for(let j=0; j<4; j++) document.getElementById('b'+j).disabled = true;
            if (i === qd[qidx].c) setTimeout(() => sw('ch'), 400);
            else { sw('wait'); document.getElementById('wait-msg').innerText = "Wrong! Waiting for next question..."; }
        }

        function chst() {
            let a = Math.floor(Math.random() * 40) + 15; alert(`You got +${a} Gold!`);
            sendScore({ n: name, v: a }); sw('wait'); document.getElementById('wait-msg').innerText = "Waiting for next round...";
        }

        function stopGame() { if (room) { room.leave(); } location.reload(); }
    </script>
</body>
</html>
