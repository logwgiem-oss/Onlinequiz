<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizQuest</title>
    <style>
        /* Strict rules to keep text completely inside screen borders */
        * { box-sizing: border-box; margin: 0; padding: 0; max-width: 90vw; }
        body { font-family: sans-serif; background: #121214; color: #fff; padding: 10px; overflow-x: hidden; }
        div { width: 90vw; margin: 10px auto; display: block; word-wrap: break-word; }
        input, button { width: 100%; padding: 12px; margin: 5px 0; font-size: 16px; display: block; white-space: normal; }
        button { background: #e43f5a; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
        ul { list-style: none; text-align: left; }
        li { background: #222; margin: 5px 0; padding: 10px; border-radius: 4px; word-break: break-all; }
    </style>
</head>
<body>

    <h1>🚀 QuizQuest P2P</h1>

    <div id="m">
        <button onclick="h()">🏠 Host Game</button>
        <button onclick="s()">📱 Join Game</button>
    </div>

    <div id="j" class="hidden">
        <input type="text" id="p" placeholder="Enter Room PIN Code">
        <input type="text" id="n" placeholder="Nickname">
        <button onclick="g()">Join Lobby</button>
        <button onclick="stopGame()">Quit</button>
    </div>

    <div id="hl" class="hidden">
        <h2>PIN: <span id="l" style="color:#22c55e;">Generating...</span></h2>
        <ul id="pl"></ul>
        <button onclick="st()">▶️ Start Quiz</button>
        <button onclick="stopGame()">Close Server</button>
    </div>

    <div id="wait" class="hidden">
        <p id="wait-msg">Connecting to room relay...</p>
        <button onclick="stopGame()">Leave</button>
    </div>

    <div id="hg" class="hidden">
        <h2 id="hq">Loading question...</h2>
        <ul id="lb"></ul>
        <button onclick="stopGame()">Force Stop</button>
    </div>

    <div id="pg" class="hidden">
        <h2>🪙 Gold: <span id="gold">0</span></h2>
        <h3 id="pq-text" style="margin: 10px 0; color:#e43f5a;">Question</h3>
        <button onclick="ans(0)" id="b0" style="background:#1e1b4b;"></button>
        <button onclick="ans(1)" id="b1" style="background:#1e1b4b;"></button>
        <button onclick="ans(2)" id="b2" style="background:#1e1b4b;"></button>
        <button onclick="ans(3)" id="b3" style="background:#1e1b4b;"></button>
    </div>

    <div id="ch" class="hidden">
        <h2>Pick a Chest</h2>
        <button onclick="chst()" style="background:#eab308; color:#000;">🎁 Chest 1</button>
        <button onclick="chst()" style="background:#eab308; color:#000;">🎁 Chest 2</button>
        <button onclick="chst()" style="background:#eab308; color:#000;">🎁 Chest 3</button>
    </div>

    <div id="go" class="hidden">
        <h2>Final Standings 🏆</h2>
        <ul id="fl"></ul>
        <button onclick="location.reload()">Return Home</button>
    </div>

    <script>
        const qd = [
            { q: "What is 5 + 7?", a: ["10", "12", "14", "11"], c: 1 },
            { q: "Which planet is Red?", a: ["Earth", "Mars", "Jupiter", "Venus"], c: 1 },
            { q: "Capital of France?", a: ["London", "Berlin", "Paris", "Rome"], c: 2 }
        ];
        
        let ws, host = false, name = "", qidx = 0, pld = {}, gold = 0, pin = "";

        function sw(id) {
            ['m', 'j', 'hl', 'wait', 'hg', 'pg', 'ch', 'go'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        function s() { sw('j'); }

        function initWS() {
            // Public browser-safe server that works perfectly on Safari/iOS
            ws = new WebSocket('wss://://socketsbay.com');
            
            ws.onmessage = (e) => {
                let msg = JSON.parse(e.data);
                if (msg.pin !== pin) return;

                if (host) {
                    if (msg.type === 'join') {
                        pld[msg.n] = { s: 0 }; ulb();
                        send({ type: 'sync', d: pld });
                    }
                    if (msg.type === 'score') {
                        pld[msg.n].s += msg.v; uhg();
                        send({ type: 'sync', d: pld });
                    }
                } else {
                    if (msg.type === 'sync') {
                        document.getElementById('wait-msg').innerText = "✅ Joined successfully! Waiting for host...";
                        if(msg.d[name] !== undefined) { gold = msg.d[name].s; document.getElementById('gold').innerText = gold; }
                    }
                    if (msg.type === 'start' || msg.type === 'nxt') { qidx = msg.i; lq(); }
                    if (msg.type === 'end') { sw('go'); document.getElementById('fl').innerHTML = "<li>Game Over! Check Host screen.</li>"; }
                }
            };
        }

        function send(obj) {
            obj.pin = pin;
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
        }

        function h() {
            host = true; pin = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('l').innerText = pin; sw('hl');
            initWS();
        }

        function ulb() {
            let u = document.getElementById('pl'); u.innerHTML = "";
            Object.keys(pld).forEach(p => { let i = document.createElement('li'); i.innerText = "👤 Player Joined: " + p; u.appendChild(i); });
        }

        function st() {
            if (Object.keys(pld).length === 0) return alert("Wait for players!");
            send({ type: 'start', i: 0 }); hlp();
        }

        function hlp() {
            sw('hg');
            if (qidx < qd.length) {
                document.getElementById('hq').innerText = qd[qidx].q; uhg();
                setTimeout(() => {
                    qidx++;
                    if (qidx < qd.length) { send({ type: 'nxt', i: qidx }); hlp(); }
                    else { send({ type: 'end' }); fin(); }
                }, 10000);
            }
        }

        function uhg() {
            let u = document.getElementById('lb'); u.innerHTML = "";
            Object.keys(pld).sort((a,b) => pld[b].s - pld[a].s).forEach((p, i) => {
                let l = document.createElement('li'); l.innerHTML = `#${i+1} <b>${p}</b>: 🪙 ${pld[p].s} Gold`; u.appendChild(l);
            });
        }

        function fin() {
            sw('go'); let u = document.getElementById('fl'); u.innerHTML = "";
            Object.keys(pld).sort((a,b) => pld[b].s - pld[a].s).forEach((p, i) => {
                let l = document.createElement('li'); l.innerText = `🏆 #${i+1}: ${p} (${pld[p].s} Gold)`; u.appendChild(l);
            });
        }

        function g() {
            pin = document.getElementById('p').value.trim();
            name = document.getElementById('n').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
            if (!pin || !name) return alert('Enter Pin and Nickname!');
            
            sw('wait');
            document.getElementById('wait-msg').innerText = "Connecting to Host PIN " + pin + "...";
            initWS();

            ws.onopen = () => {
                setInterval(() => { send({ type: 'join', n: name }); }, 1500);
            };
        }

        function lq() {
            sw('pg'); let q = qd[qidx];
            document.getElementById('pq-text').innerText = q.q;
            for(let i=0; i<4; i++) { let b = document.getElementById('b'+i); b.innerText = q.a[i]; b.disabled = false; }
        }

        function ans(i) {
            for(let j=0; j<4; j++) document.getElementById('b'+j).disabled = true;
            if (i === qd[qidx].c) { setTimeout(() => sw('ch'), 400); }
            else { sw('wait'); document.getElementById('wait-msg').innerText = "Wrong! Waiting for next question..."; }
        }

        function chst() {
            let a = Math.floor(Math.random() * 40) + 15; alert(`You got +${a} Gold!`);
            send({ type: 'score', n: name, v: a }); sw('wait');
            document.getElementById('wait-msg').innerText = "Waiting for next question...";
        }

        function stopGame() { if (ws) { ws.close(); } location.reload(); }
    </script>
</body>
</html>
