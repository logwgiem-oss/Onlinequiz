<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <!-- PeerJS links for free multiplayer with no API keys -->
    <script src="https://unpkg.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; max-width: 90vw; }
        body { font-family: sans-serif; background: #121214; color: #fff; padding: 10px; overflow-x: hidden; }
        div { width: 90vw; margin: 10px auto; display: block; word-wrap: break-word; }
        input, button { width: 100%; padding: 12px; margin: 5px 0; font-size: 16px; display: block; }
        button { background: #e43f5a; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
        .hidden { display: none !important; }
        ul { list-style: none; text-align: left; }
        li { background: #222; margin: 5px 0; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>QuizQuest P2P</h1>

    <div id="m">
        <button onclick="h()">🏠 Host Game</button>
        <button onclick="s()">📱 Join Game</button>
    </div>

    <div id="j" class="hidden">
        <input type="text" id="p" placeholder="Enter Host ID code">
        <input type="text" id="n" placeholder="Nickname">
        <button onclick="g()">Join</button>
    </div>

    <div id="hl" class="hidden">
        <h2>ID CODE: <span id="l" style="color:#22c55e; font-size:14px;">Loading...</span></h2>
        <ul id="pl"></ul>
        <button onclick="st()">▶️ Start</button>
    </div>

    <div id="wait" class="hidden">
        <p>Connected! Waiting for host...</p>
    </div>

    <div id="hg" class="hidden">
        <h2 id="hq">Loading...</h2>
        <ul id="lb"></ul>
    </div>

    <div id="pg" class="hidden">
        <h2 id="gold">🪙 Gold: 0</h2>
        <h3 id="pq-text">Question text</h3>
        <button onclick="ans(0)" id="b0"></button>
        <button onclick="ans(1)" id="b1"></button>
        <button onclick="ans(2)" id="b2"></button>
        <button onclick="ans(3)" id="b3"></button>
    </div>

    <div id="ch" class="hidden">
        <h2>Pick a Chest</h2>
        <button onclick="chst()">🎁 Chest 1</button>
        <button onclick="chst()">🎁 Chest 2</button>
        <button onclick="chst()">🎁 Chest 3</button>
    </div>

    <div id="go" class="hidden">
        <h2>Final Standings 🏆</h2>
        <ul id="fl"></ul>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script>
        const qd = [
            { q: "What is 5 + 7?", a: ["10", "12", "14", "11"], c: 1 },
            { q: "Which planet is Red?", a: ["Earth", "Mars", "Jupiter", "Venus"], c: 1 }
        ];
        let peer, conn, channel, host = false, name = "", qidx = 0, pld = {}, gold = 0, connections = [];

        function sw(id) {
            ['m', 'j', 'hl', 'wait', 'hg', 'pg', 'ch', 'go'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        function s() { sw('j'); }

        function h() {
            host = true; sw('hl');
            peer = new Peer();
            peer.on('open', (id) => { document.getElementById('l').innerText = id; });
            peer.on('connection', (c) => {
                connections.push(c);
                c.on('data', (data) => {
                    if (data.type === 'join') {
                        pld[data.n] = { s: 0 };
                        ulb();
                    }
                    if (data.type === 'score') {
                        pld[data.n].s += data.v;
                        uhg();
                        connections.forEach(conn => conn.send({ type: 'sync', d: pld }));
                    }
                });
            });
        }

        function ulb() {
            let u = document.getElementById('pl'); u.innerHTML = "";
            Object.keys(pld).forEach(p => { let i = document.createElement('li'); i.innerText = "👤 " + p; u.appendChild(i); });
        }

        function st() {
            connections.forEach(c => c.send({ type: 'start', i: 0 }));
            hlp();
        }

        function hlp() {
            sw('hg');
            if (qidx < qd.length) {
                document.getElementById('hq').innerText = qd[qidx].q; uhg();
                setTimeout(() => {
                    qidx++;
                    if (qidx < qd.length) { 
                        connections.forEach(c => c.send({ type: 'nxt', i: qidx }));
                        hlp(); 
                    } else { 
                        connections.forEach(c => c.send({ type: 'end' }));
                        fin(); 
                    }
                }, 10000);
            }
        }

        function uhg() {
            let u = document.getElementById('lb'); u.innerHTML = "";
            Object.keys(pld).sort((a,b) => pld[b].s - pld[a].s).forEach((p, i) => {
                let l = document.createElement('li'); l.innerHTML = `#${i+1} <b>${p}</b>: 🪙 ${pld[p].s}`; u.appendChild(l);
            });
        }

        function fin() {
            sw('go'); let u = document.getElementById('fl'); u.innerHTML = "";
            Object.keys(pld).sort((a,b) => pld[b].s - pld[a].s).forEach((p, i) => {
                let l = document.createElement('li'); l.innerText = `🏆 #${i+1}: ${p} (${pld[p].s})`; u.appendChild(l);
            });
        }

        function g() {
            let pin = document.getElementById('p').value.trim();
            name = document.getElementById('n').value.trim();
            if (!pin || !name) return alert('Error');
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(pin);
                conn.on('open', () => {
                    conn.send({ type: 'join', n: name });
                    sw('wait');
                });
                conn.on('data', (data) => {
                    if (data.type === 'start' || data.type === 'nxt') { qidx = data.i; lq(); }
                    if (data.type === 'sync') { if(data.d[name] !== undefined) { gold = data.d[name].s; document.getElementById('gold').innerText = "🪙 Gold: " + gold; } }
                    if (data.type === 'end') { sw('go'); document.getElementById('fl').innerHTML = "<li>Check Host screen!</li>"; }
                });
            });
        }

        function lq() {
            sw('pg'); let q = qd[qidx];
            document.getElementById('pq-text').innerText = q.q;
            for(let i=0; i<4; i++) { let b = document.getElementById('b'+i); b.innerText = q.a[i]; b.disabled = false; }
        }

        function ans(i) {
            for(let j=0; j<4; j++) document.getElementById('b'+j).disabled = true;
            if (i === qd[qidx].c) { setTimeout(() => sw('ch'), 400); }
            else { sw('wait'); }
        }

        function chst() {
            let a = Math.floor(Math.random() * 30) + 10; alert(`+${a} Gold!`);
            conn.send({ type: 'score', n: name, v: a });
            sw('wait');
        }
    </script>
</body>
</html>
